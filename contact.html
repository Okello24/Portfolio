 <script>

        publicKey: "eFlkmna47FbuPAspM",
        });
      })();
 </script>
</head>
<body>

<header>

<div class="container">
  <h1 id="typing" ><span class="midnightblue">Con</span><span class="skyblue">tact Me</span></h1>

  <form id="contact-form" onsubmit="sendEmail(event)">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <input type="text" name="subject" placeholder="Subject" required>
    <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
    <button  type="submit" class="midnightblue-btn">Send Message</button>
    <p id="form-status"></p>
  </form>
</div>

<footer>

<!-- ================= EMAIL SEND SCRIPT ================= -->
<script>
function sendEmail(event) {
    event.preventDefault();

    const status = document.getElementById("form-status");
    status.style.color = "#000";
    status.innerText = "Sending message...";

    emailjs.send(
        "service_1fkqc0n",
        "template_hd2vzku",
        {
            name: document.querySelector("[name='name']").value,
            email: document.querySelector("[name='email']").value,
            subject: document.querySelector("[name='subject']").value,
            message: document.querySelector("[name='message']").value
        },
        "eFlkmna47FbuPAspM"
    )
    .then(function () {
        status.style.color = "green";
        status.innerText = "✅ Message sent successfully!";
        document.getElementById("contact-form").reset();
    })
    .catch(function (error) {
        status.style.color = "red";
        status.innerText = "❌ Failed to send message. Please try again.";
        console.error("EmailJS Error:", error);
    });
}
</script>

</body>
</html>
